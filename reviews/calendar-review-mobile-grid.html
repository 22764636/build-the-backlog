<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendar — Mobile Month Grid</title>
<link rel="stylesheet" href="../style.css">
<style>
  body{padding:0;margin:0}
  .frame-lbl{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.68rem;letter-spacing:.06em;
    text-transform:uppercase;color:var(--pink);padding:.5rem .6rem .25rem}
  #calOv{position:static!important;display:flex!important;background:none!important;backdrop-filter:none!important;padding:.5rem!important}
  #calOv>div{width:100%!important;max-width:none!important}
</style>
</head>
<body>

<div class="frame-lbl">Month Grid (default mobile state, TBA off) — one month, same as desktop</div>
<div id="calOv">
  <div style="background:var(--s1);border:1px solid var(--bd2);border-radius:var(--rl);width:100%;margin:0 auto">
    <div id="calHdr" style="border-bottom:1px solid var(--bd)">
      <div class="cal-hdr-inner">
        <span class="cal-hdr-title">Release Calendar</span>
        <div class="cal-hdr-nav">
          <select class="ts cal-month-sel"><option>July</option></select>
          <select class="ts cal-year-sel"><option>2026</option></select>
        </div>
        <div class="cal-hdr-right">
          <button class="fbar-pill cal-tba-toggle" title="Undated games">UNDATED<span class="fbar-pill-count fpc-dark">4</span></button>
          <button class="hb accent">✕</button>
        </div>
      </div>
    </div>
    <div style="padding:.5rem .6rem">
      <div class="cal-2stack"><div class="cal-months-col">
        <div class="cal-month-block">
          <div class="cal-month-label is-current">July 2026</div>
          <div class="cal-grid">
            <div class="cal-dow">M</div><div class="cal-dow">T</div><div class="cal-dow">W</div>
            <div class="cal-dow">T</div><div class="cal-dow">F</div><div class="cal-dow">S</div><div class="cal-dow">S</div>
            <div class="cal-cell other-month"><div class="cal-dn">29</div></div>
            <div class="cal-cell other-month"><div class="cal-dn">30</div></div>
            <div class="cal-cell"><div class="cal-dn">1</div></div>
            <div class="cal-cell today"><div class="cal-dn">2</div></div>
            <div class="cal-cell"><div class="cal-dn">3</div></div>
            <div class="cal-cell"><div class="cal-dn">4</div><div class="cal-count has-pre">1</div></div>
            <div class="cal-cell"><div class="cal-dn">5</div></div>
            <div class="cal-cell"><div class="cal-dn">6</div></div>
            <div class="cal-cell"><div class="cal-dn">7</div></div>
            <div class="cal-cell"><div class="cal-dn">8</div></div>
            <div class="cal-cell"><div class="cal-dn">9</div><div class="cal-count">1</div></div>
            <div class="cal-cell"><div class="cal-dn">10</div></div>
            <div class="cal-cell"><div class="cal-dn">11</div></div>
            <div class="cal-cell"><div class="cal-dn">12</div></div>
            <div class="cal-cell"><div class="cal-dn">13</div></div>
            <div class="cal-cell"><div class="cal-dn">14</div></div>
            <div class="cal-cell"><div class="cal-dn">15</div></div>
            <div class="cal-cell"><div class="cal-dn">16</div></div>
            <div class="cal-cell"><div class="cal-dn">17</div></div>
            <div class="cal-cell"><div class="cal-dn">18</div><div class="cal-count">2</div></div>
            <div class="cal-cell"><div class="cal-dn">19</div></div>
            <div class="cal-cell"><div class="cal-dn">20</div></div>
            <div class="cal-cell"><div class="cal-dn">21</div></div>
            <div class="cal-cell"><div class="cal-dn">22</div></div>
            <div class="cal-cell"><div class="cal-dn">23</div></div>
            <div class="cal-cell"><div class="cal-dn">24</div></div>
            <div class="cal-cell"><div class="cal-dn">25</div></div>
            <div class="cal-cell"><div class="cal-dn">26</div></div>
            <div class="cal-cell"><div class="cal-dn">27</div></div>
            <div class="cal-cell"><div class="cal-dn">28</div></div>
            <div class="cal-cell"><div class="cal-dn">29</div></div>
            <div class="cal-cell"><div class="cal-dn">30</div></div>
            <div class="cal-cell"><div class="cal-dn">31</div></div>
            <div class="cal-cell other-month"><div class="cal-dn">1</div></div>
            <div class="cal-cell other-month"><div class="cal-dn">2</div></div>
          </div>
        </div>
      </div></div>
    </div>
  </div>
</div>

</body>
</html>

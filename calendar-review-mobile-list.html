<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendar — Mobile List View</title>
<link rel="stylesheet" href="style.css">
<style>
  body{padding:0;margin:0}
  .frame-lbl{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.68rem;letter-spacing:.06em;
    text-transform:uppercase;color:var(--pink);padding:.5rem .6rem .25rem}
  #calOv{position:static!important;display:flex!important;background:none!important;backdrop-filter:none!important;padding:.5rem!important}
  #calOv>div{width:100%!important;max-width:none!important}
</style>
</head>
<body>

<div class="frame-lbl">List View (default mobile state, TBA off)</div>
<div id="calOv">
  <div style="background:var(--s1);border:1px solid var(--bd2);border-radius:var(--rl);width:100%;margin:0 auto">
    <div id="calHdr" style="border-bottom:1px solid var(--bd)">
      <div class="cal-hdr-inner">
        <span class="cal-hdr-title">Release Calendar</span>
        <div class="cal-hdr-nav">
          <select class="ts cal-month-sel"><option>July</option></select>
          <select class="ts cal-year-sel"><option>2026</option></select>
        </div>
        <div class="cal-hdr-right">
          <button class="hb cal-tba-toggle accent" title="Date Unknown games">TBA (4)</button>
          <button class="hb accent">✕</button>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:0;min-height:200px;align-items:center;padding:.6rem .75rem">
      <div style="flex:1;min-width:0">
        <div class="cal-list-item pre" onclick="return false">
          <div class="cal-list-date">Jul 4</div>
          <div class="cal-list-title">Starfall Odyssey</div>
          <span style="font-size:.6rem;background:var(--amber);color:#031329;border-radius:4px;padding:1px 5px;font-weight:700;flex-shrink:0">PRE</span>
        </div>
        <div class="cal-list-item" onclick="return false">
          <div class="cal-list-date">Jul 9</div>
          <div class="cal-list-title">Nightfall Protocol: A Very Long Title That Truncates</div>
        </div>
        <div class="cal-list-item" onclick="return false">
          <div class="cal-list-date">Jul 18</div>
          <div class="cal-list-title">Rust Vanguard</div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
